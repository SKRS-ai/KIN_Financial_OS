<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Kin Financial OS Secure Gateway</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="auth-body">

    <header class="auth-header">
        <div class="container auth-nav">
            <a href="index.html" class="brand">
                <span class="brand-name">KIN</span>
                <span class="brand-divider">|</span>
                <span class="product-name">GATEWAY</span>
            </a>
            <a href="register.html" class="link-secondary">New to Kin? Enroll Now</a>
        </div>
    </header>

    <main class="container auth-main">
        <div class="auth-wrapper">
            
            <section class="auth-card">
                <div class="system-ping">
                    <span class="pulse-green"></span>
                    <p>OS Security: Active</p>
                </div>
                
                <h1>Access your <span class="accent-text">Hub.</span></h1>
                <p class="auth-subtitle">Enter your credentials to unlock the Personal Finance Operating System.</p>

                <form class="login-form">
                    <div class="input-group">
                        <label>Member Email</label>
                        <input type="email" placeholder="name@domain.com" required>
                    </div>

                    <div class="input-group">
                        <label>Vault Passphrase</label>
                        <input type="password" placeholder="••••••••••••" required>
                    </div>

                    <div class="login-options">
                        <label class="remember-me">
                            <input type="checkbox"> Remember this device
                        </label>
                        <a href="reset.html" class="forgot-link">Forgot Passphrase?</a>
                    </div>

                    <button type="submit" class="btn-primary-lg full-width">Unlock OS Cockpit</button>
                </form>
            </section>

            <div class="biometric-row">
                <p>Or sign in with</p>
                <div class="bio-icons">
                    <span title="FaceID">👤</span>
                    <span title="Fingerprint">☝️</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="auth-simple-footer">
        <p>&copy; 2026 Solomon Kin, LLC. | 256-bit Institutional Encryption Active.</p>
    </footer>

</body>
</html>
